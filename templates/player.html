{{ template "header" . }}

<div class="hero">
    <div class="hero-identity">
        <h1 class="hero-name">{{ .PlayerName }}</h1>
        <span class="hero-meta" id="heroMeta"></span>
    </div>
    <div class="hero-controls">
        <div class="season-selector">
            <label for="seasonSelect">Season</label>
            <select id="seasonSelect">
                {{range .Seasons}}
                    <option value="{{.}}" {{if eq . $.SelectedSeason}}selected{{end}}>{{.}}</option>
                {{end}}
            </select>
        </div>
        <div class="hero-actions">
            <button id="downloadChart" class="btn-ghost">↓ Download Chart</button>
            <a
                id="savantLink"
                class="btn-ghost btn-accent"
                href="https://baseballsavant.mlb.com/visuals/statcast-infield-defense?type=Fielder&playerId={{ .PlayerID }}&startYear={{ .SelectedSeason }}&endYear={{ .SelectedSeason }}&result=&direction=&normalize=undefined&roles=&esrGT=0&esrLT=1&evGT=0&evLT=125&distGT=0&distLT=200&batside=&viz=intercept_fielder_starting_position_"
                >View on Savant ↗</a>
        </div>
    </div>
</div>

<canvas id="playerChart"></canvas>

<script>
    window.playerPageData = {
        playerID: {{ .PlayerID }},
        playerName: {{ toJSON .PlayerName }},
        playerPositions: {{ toJSON .PlayerPositions }},
        playerStatsBySeason: {{ toJSON .PlayerStatsBySeason }},
        seasons: {{ toJSON .Seasons }},
        selectedSeason: {{ .SelectedSeason }}
    };
</script>

<script src="/static/playerPage.js" defer></script>

{{ template "footer" . }}
