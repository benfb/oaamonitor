{{ template "header" . }}

<div class="hero">
    <div class="hero-identity">
        <h1 class="hero-name">{{ .TeamName }}</h1>
        <span class="hero-meta">{{ .TeamAbbreviation }}</span>
    </div>
    <div class="hero-controls">
        <div class="season-selector">
            <label for="seasonSelect">Season</label>
            <select id="seasonSelect">
                {{range .Seasons}}
                    <option value="{{.}}" {{if eq . $.SelectedSeason}}selected{{end}}>{{.}}</option>
                {{end}}
            </select>
        </div>
        <div class="hero-actions">
            <button id="downloadChart" class="btn-ghost">↓ Download Chart</button>
            <a
                id="savantLink"
                class="btn-ghost btn-accent"
                href="https://baseballsavant.mlb.com/leaderboard/outs_above_average?type=Fielder&startYear={{ .CurrentYear }}&endYear={{ .CurrentYear }}&split=yes&team={{ .TeamAbbreviation }}&range=year&min=10&pos=&roles=&viz=hide"
                target="_blank"
                >View on Savant ↗</a>
        </div>
    </div>
</div>

<canvas id="teamChart"></canvas>

<div id="playersList">
    <div class="section-label">
        <span>{{ .TeamName }} OAA</span>
    </div>
    <table id="teamPlayersTable">
        <thead>
            <tr>
                <th>Player</th>
                <th>Position</th>
                <th class="col-right">OAA</th>
                <th></th>
            </tr>
        </thead>
        <tbody id="teamPlayersTableBody">
            {{ range .SparklinesData }}
            <tr>
                <td><a href="/player/{{ .PlayerID }}?season={{ $.SelectedSeason }}">{{ .Name }}</a></td>
                <td>{{ .Position }}</td>
                <td class="col-right {{ if gt .LatestOAA 0 }}positive{{ else if lt .LatestOAA 0 }}negative{{ end }}">{{ .LatestOAA }}</td>
                <td>
                    <canvas id="playerChart{{ .PlayerID }}"></canvas>
                </td>
            </tr>
            {{ end }}
        </tbody>
    </table>
</div>

<script>
    window.teamPageData = {
        teamName: {{ toJSON .TeamName }},
        teamAbbreviation: {{ toJSON .TeamAbbreviation }},
        teamStatsBySeason: {{ toJSON .TeamStatsBySeason }},
        sparklinesBySeason: {{ toJSON .SparklinesBySeason }},
        seasons: {{ toJSON .Seasons }},
        selectedSeason: {{ .SelectedSeason }}
    };
</script>

<script src="/static/teamPage.js" defer></script>

{{ template "footer" . }}
